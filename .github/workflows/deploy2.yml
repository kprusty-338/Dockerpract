name: Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile Java
        run: javac LoginServer.java

      # ✅ SonarCloud Scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
        with:
          args: >
            -Dsonar.projectKey=kprusty-338_Dockerpract
            -Dsonar.organization=kprusty-338
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

      # ✅ Generate short commit SHA (7 characters)
      - name: Generate Image Tag
        id: meta
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build with two tags (version + latest)
      - name: Build Docker Image
        run: |
          docker build \
          -t kiranprusty/devops:${{ steps.meta.outputs.short_sha }} \
          -t kiranprusty/devops:latest .

      # ✅ Push both tags
      - name: Push Docker Images
        run: |
          docker push kiranprusty/devops:${{ steps.meta.outputs.short_sha }}
          docker push kiranprusty/devops:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Pull Versioned Image
        run: docker pull kiranprusty/devops:${{ needs.build.outputs.image_tag }}

      - name: Stop Old Container (if exists)
        run: |
          docker stop login-app || true
          docker rm login-app || true

      - name: Run New Container
        run: |
          docker run -d -p 8080:8080 \
          --name login-app \
          kiranprusty/devops:${{ needs.build.outputs.image_tag }}

      - name: Test Deployment
        run: |
          sleep 10
          curl http://localhost:8080
          